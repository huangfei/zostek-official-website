name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Checkout style 2
        uses: actions/checkout@v4
        with:
          ref: 风格2
          path: style2-src

      - name: Install style 2 dependencies
        working-directory: style2-src
        run: npm ci

      - name: Build style 2
        working-directory: style2-src
        run: npm run build -- --base=/zostek-official-website/style2/

      - name: Copy style 2 artifact
        run: |
          mkdir -p dist/style2
          cp -R style2-src/dist/* dist/style2/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy
        uses: actions/deploy-pages@v4
